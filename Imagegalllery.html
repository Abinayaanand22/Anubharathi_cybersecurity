<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Advanced Image Gallery</title>

    <style>
      body {
        margin: 0;
        font-family: Arial;
        background: #111;
        color: white;
        text-align: center;
      }

      h2 {
        padding: 20px;
      }

      /* Gallery Grid */
      .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 15px;
        padding: 20px;
      }

      .gallery img {
        width: 100%;
        height: 200px;
        object-fit: cover;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.4s;
      }

      .gallery img:hover {
        transform: scale(1.05);
        filter: brightness(1.2);
      }

      /* Lightbox */
      .lightbox {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.9);
        justify-content: center;
        align-items: center;
        flex-direction: column;
      }

      .lightbox img {
        max-width: 80%;
        max-height: 70%;
        border-radius: 10px;
        animation: fadeIn 0.5s;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: scale(0.8);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      .controls {
        margin-top: 15px;
      }

      button {
        padding: 10px 15px;
        margin: 5px;
        font-size: 16px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        background: #ff4c60;
        color: white;
      }

      button:hover {
        background: #ff2e45;
      }

      .close {
        position: absolute;
        top: 20px;
        right: 30px;
        font-size: 30px;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <h2>Image Gallery</h2>

    <div class="gallery">
      <img
        src="https://picsum.photos/id/1015/600/400"
        onclick="openLightbox(0)"
      />
      <img
        src="https://picsum.photos/id/1016/600/400"
        onclick="openLightbox(1)"
      />
      <img
        src="https://picsum.photos/id/1018/600/400"
        onclick="openLightbox(2)"
      />
      <img
        src="https://picsum.photos/id/1020/600/400"
        onclick="openLightbox(3)"
      />
      <img
        src="https://picsum.photos/id/1024/600/400"
        onclick="openLightbox(4)"
      />
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
      <span class="close" onclick="closeLightbox()">×</span>
      <img id="lightbox-img" />

      <div class="controls">
        <button onclick="prev()">Prev</button>
        <button onclick="next()">Next</button>
      </div>
    </div>

    <script>
      const images = [
        "https://picsum.photos/id/1015/600/400",
        "https://picsum.photos/id/1016/600/400",
        "https://picsum.photos/id/1018/600/400",
        "https://picsum.photos/id/1020/600/400",
        "https://picsum.photos/id/1024/600/400",
      ];

      let current = 0;

      function openLightbox(index) {
        current = index;
        document.getElementById("lightbox").style.display = "flex";
        document.getElementById("lightbox-img").src = images[current];
      }

      function closeLightbox() {
        document.getElementById("lightbox").style.display = "none";
      }

      function next() {
        current = (current + 1) % images.length;
        document.getElementById("lightbox-img").src = images[current];
      }

      function prev() {
        current = (current - 1 + images.length) % images.length;
        document.getElementById("lightbox-img").src = images[current];
      }
    </script>
  </body>
</html>
