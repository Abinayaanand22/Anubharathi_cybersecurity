<!doctype html>
<html>
  <head>
    <title>Simply Delicious</title>

    <style>
      body {
        margin-top: 40vh;
        height: 100vh;

        /* FULL SCREEN BACKGROUND IMAGE */

        background-image: url("images/into.png");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;

        display: flex;
        justify-content: center;
        align-items: center;

        font-family: Arial, Helvetica, sans-serif;
      }

      /* BUTTON STYLE */

      .start-btn {
        padding: 14px 40px;
        font-size: 18px;
        border-radius: 10px;
        border: 2px solid #8b4513;
        background: white;
        cursor: pointer;
        transition: 0.3s;
      }

      /* BROWN GRADIENT HOVER EFFECT */

      .start-btn:hover {
        background: linear-gradient(#d2a679, #a0522d);
        color: white;
      }
    </style>
  </head>

  <body>
    <a href="index.html">
      <button class="start-btn">Let's Start</button>
    </a>
  </body>
</html>
