<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Minula 🎂</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  overflow: hidden;

  /* Center everything */
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

h1 {
  color: white;
  font-size: 5vw;
  margin-bottom: 20px;
  text-align: center;
}

/* Cake (responsive) */
.cake {
  position: relative;
  width: 40vw;
  max-width: 250px;
  height: 25vw;
  max-height: 160px;
  background: #ff66b2;
  border-radius: 15px;
  animation: pop 1s ease;
}

@keyframes pop {
  0% { transform: scale(0); }
  100% { transform: scale(1); }
}

.icing {
  position: absolute;
  top: -15%;
  width: 100%;
  height: 30%;
  background: white;
  border-radius: 50%;
}

.candle {
  position: absolute;
  width: 5%;
  height: 30%;
  background: black;
  top: -40%;
  left: 47%;
}

.flame {
  position: absolute;
  width: 6%;
  height: 10%;
  background: orange;
  border-radius: 50%;
  top: -55%;
  left: 46%;
  animation: flicker 0.3s infinite alternate;
}

@keyframes flicker {
  from { transform: scale(1); }
  to { transform: scale(1.3); }
}

/* Button */
button {
  margin-top: 30px;
  padding: 12px 25px;
  font-size: 4vw;
  max-font-size: 16px;
  background: #ff3399;
  color: white;
  border: none;
  border-radius: 25px;
  cursor: pointer;
}

/* Popup */
.popup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  background: white;
  padding: 25px;
  border-radius: 20px;
  transition: 0.5s;
  text-align: center;
}

.popup.show {
  transform: translate(-50%, -50%) scale(1);
}

/* Balloons */
.balloon {
  position: absolute;
  width: 8vw;
  height: 12vw;
  border-radius: 50%;
  bottom: -100px;
  animation: float linear infinite;
}

@keyframes float {
  0% { transform: translateY(0); }
  100% { transform: translateY(-120vh); }
}

/* Confetti */
.confetti {
  position: absolute;
  width: 2vw;
  height: 2vw;
  animation: fall linear infinite;
}

@keyframes fall {
  0% { top: -10px; }
  100% { top: 100vh; }
}
</style>

</head>

<body>

<h1>🎉 Happy Birthday Minula 🎂</h1>

<div class="cake">
  <div class="icing"></div>
  <div class="candle"></div>
  <div class="flame" id="flame"></div>
</div>

<button onclick="celebrate()">Blow Candle 💨</button>

<div class="popup" id="popup">
  <h2>✨ Wish Made!</h2>
  <p>Happy Birthday Minula! 🎉💖</p>
</div>

<script>
function celebrate() {
  document.getElementById("flame").style.display = "none";
  document.getElementById("popup").classList.add("show");

  // Balloons
  for (let i = 0; i < 25; i++) {
    let b = document.createElement("div");
    b.className = "balloon";
    b.style.left = Math.random() * 100 + "vw";
    b.style.background = "hsl(" + Math.random()*360 + ",70%,60%)";
    b.style.animationDuration = (4 + Math.random()*3) + "s";
    document.body.appendChild(b);
  }

  // Confetti
  for (let i = 0; i < 40; i++) {
    let c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random() * 100 + "vw";
    c.style.background = "hsl(" + Math.random()*360 + ",70%,60%)";
    c.style.animationDuration = (3 + Math.random()*3) + "s";
    document.body.appendChild(c);
  }
}
</script>

</body>
</html>
