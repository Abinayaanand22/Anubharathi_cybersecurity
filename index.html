<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>To-Do List App</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #74ebd5 0%, #acb6e5 100%);
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .app {
        background: #fff;
        width: 350px;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
      }
      h1 {
        text-align: center;
        color: #333;
        margin-bottom: 20px;
      }
      .input-area {
        display: flex;
        justify-content: space-between;
        margin-bottom: 20px;
      }
      input {
        flex: 1;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 8px;
        outline: none;
        transition: border 0.3s;
      }
      input:focus {
        border-color: #74ebd5;
      }
      button {
        margin-left: 10px;
        padding: 10px 15px;
        border: none;
        background: #74ebd5;
        color: #fff;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.3s;
      }
      button:hover {
        background: #4bb3a7;
      }
      ul {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      li {
        background: #f9f9f9;
        margin-bottom: 10px;
        padding: 10px;
        border-radius: 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: transform 0.2s;
      }
      li:hover {
        transform: scale(1.02);
      }
      .delete {
        background: #ff6b6b;
        border: none;
        padding: 6px 10px;
        border-radius: 6px;
        color: #fff;
        cursor: pointer;
        transition: background 0.3s;
      }
      .delete:hover {
        background: #e63946;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <h1>My To-Do List</h1>
      <div class="input-area">
        <input type="text" id="taskInput" placeholder="Enter a new task..." />
        <button onclick="addTask()">Add</button>
      </div>
      <ul id="taskList"></ul>
    </div>

    <script>
      function addTask() {
        const input = document.getElementById("taskInput");
        const task = input.value.trim();
        if (task === "") return;

        const li = document.createElement("li");
        li.textContent = task;

        const deleteBtn = document.createElement("button");
        deleteBtn.textContent = "Delete";
        deleteBtn.className = "delete";
        deleteBtn.onclick = function () {
          li.remove();
        };

        li.appendChild(deleteBtn);
        document.getElementById("taskList").appendChild(li);

        input.value = "";
      }
    </script>
  </body>
</html>
