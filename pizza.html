<!doctype html>
<html>
  <head>
    <title>Pizza</title>
    <style>
      body {
        margin: 0;
        padding: 80px;
        background-image: url("images/recipebg.png");
        background-size: cover;
        font-family: "Times New Roman";
        color: #4b2e19;
      }
      h1 {
        text-align: center;
        font-size: 50px;
        color: #5a2d0c;
      }
      h2 {
        color: #7b3f00;
        margin-top: 40px;
      }
      ul {
        font-size: 20px;
        line-height: 1.8;
      }

      .back {
        text-align: center;
        margin-top: 50px;
      }

      .back a {
        padding: 10px 25px;
        border: 2px solid brown;
        border-radius: 10px;
        text-decoration: none;
        color: brown;
      }

      .back a:hover {
        background: linear-gradient(#d2a679, #a0522d);
        color: white;
      }
    </style>
  </head>

  <body>
    <h1>Pizza</h1>

    <h2>Ingredients</h2>
    <ul>
      <li>1 pizza base</li>
      <li>½ cup pizza sauce</li>
      <li>½ cup cheese</li>
      <li>Capsicum slices</li>
      <li>Onion slices</li>
      <li>Olives</li>
    </ul>

    <h2>Procedure</h2>
    <ul>
      <li>Spread pizza sauce on base.</li>
      <li>Add vegetables.</li>
      <li>Sprinkle cheese.</li>
      <li>Bake in oven for 10 minutes.</li>
      <li>Cut and serve hot.</li>
    </ul>

    <div class="back">

    </div>
  </body>
</html>
